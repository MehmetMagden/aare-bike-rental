name: The Infinity Pipeline

on:
    push:
        branches: [ master ]

jobs:
    test-stage:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'

            - name: Run Tests
              run: |
                pip install -r app/requirements.txt
                pytest tests/ -v

    docker-stage:
        needs: test-stage
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and Push
              uses: docker/build-push-action@v5
              with:
                context: .
                push: true
                tags: wowmaker/aare-bike-rental:latest